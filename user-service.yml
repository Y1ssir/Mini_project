# ============================================================
# user-service.yml - Configuration spécifique au User Service
# ============================================================

server:
  port: ${USER_SERVICE_PORT:8081}

spring:
  application:
    name: user-service

  # ----------------------------------------
  # Base de données dédiée au User Service
  # ----------------------------------------
  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${USER_DB_NAME:user_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  # ----------------------------------------
  # Flyway - Migrations de base de données
  # ----------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# ----------------------------------------
# MinIO - Stockage des avatars utilisateurs
# ----------------------------------------
minio:
  endpoint: ${MINIO_ENDPOINT:http://minio:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket:
    avatars: user-avatars

# ----------------------------------------
# Paramètres spécifiques au service
# ----------------------------------------
app:
  user:
    # Taille maximale des avatars uploadés (en octets)
    max-avatar-size: 5242880  # 5 MB
    # Rôles disponibles dans l'application
    roles:
      - ROLE_USER
      - ROLE_TECHNICIAN
      - ROLE_MANAGER
      - ROLE_ADMIN
    # JWT : durée de vie des sessions (pour info, Keycloak gère ça)
    session-timeout-minutes: 480

logging:
  level:
    com.incident.user: DEBUG

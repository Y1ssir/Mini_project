# ============================================================
# application.yml - chat-service
# ============================================================
# Configuration locale (développement sans Docker).
# En mode Docker, les valeurs sont surchargées par les
# variables d'environnement et le Config Server.
# ============================================================

spring:
  application:
    name: chat-service

  # --------------------------------------------------------
  # Config Server — charge la config centralisée depuis
  # config-repo/chat-service.yml au démarrage
  # --------------------------------------------------------
  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}

  # --------------------------------------------------------
  # Base de données PostgreSQL
  # ✅ CORRIGÉ : nom de la base = chat_db (cohérent avec init-db.sql)
  # --------------------------------------------------------
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${CHAT_DB_NAME:chat_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # Flyway gère les migrations
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # --------------------------------------------------------
  # Spring AI — OpenAI / OpenRouter
  # La clé API est fournie via la variable OPENROUTER_API_KEY
  # --------------------------------------------------------
  ai:
    openai:
      api-key: ${OPENROUTER_API_KEY:changeme}
      base-url: https://openrouter.ai/api
      chat:
        options:
          model: openai/gpt-4o-mini
          temperature: 0.4

  # --------------------------------------------------------
  # OAuth2 Resource Server — Validation JWT Keycloak
  # --------------------------------------------------------
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/incident-realm}

server:
  port: ${CHAT_SERVICE_PORT:8084}

# --------------------------------------------------------
# Eureka Client — Enregistrement auprès du Service Register
# --------------------------------------------------------
eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://admin:admin@localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true

# --------------------------------------------------------
# Spring Cloud Config Client — Authentification Basic Auth
# --------------------------------------------------------
spring.cloud.config:
  uri: ${CONFIG_SERVER_URI:http://localhost:8888}
  username: ${CONFIG_SERVER_USERNAME:configuser}
  password: ${CONFIG_SERVER_PASSWORD:configpassword}
  fail-fast: false

# --------------------------------------------------------
# Actuator
# --------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# --------------------------------------------------------
# Logging
# --------------------------------------------------------
logging:
  level:
    com.ems.chat: DEBUG
    org.springframework.security: WARN
    org.springframework.ai: WARN

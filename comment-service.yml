# ============================================================
# comment-service.yml - Configuration spécifique au Comment Service
# ============================================================

server:
  port: ${COMMENT_SERVICE_PORT:8083}

spring:
  application:
    name: comment-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${COMMENT_DB_NAME:comment_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

# ----------------------------------------
# Communication inter-services
# ----------------------------------------
services:
  user-service:
    url: lb://USER-SERVICE
  incident-service:
    url: lb://INCIDENT-SERVICE

# ----------------------------------------
# Paramètres métier des commentaires
# ----------------------------------------
app:
  comment:
    # Longueur maximale d'un commentaire
    max-length: 5000
    # Types de commentaires
    types:
      - COMMENT
      - INTERNAL_NOTE
      - STATUS_CHANGE
      - RESOLUTION
    # Pagination par défaut
    default-page-size: 20
    max-page-size: 100

logging:
  level:
    com.incident.comment: DEBUG

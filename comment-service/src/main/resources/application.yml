# ============================================================
# application.yml - comment-service
# ============================================================
# Configuration locale (développement sans Docker).
# En mode Docker, les valeurs sont surchargées par les
# variables d'environnement et le Config Server.
# ============================================================

server:
  port: ${COMMENT_SERVICE_PORT:8083}

spring:
  application:
    name: comment-service

  # --------------------------------------------------------
  # Config Server — charge la config centralisée depuis
  # config-repo/comment-service.yml au démarrage
  # --------------------------------------------------------
  config:
    import: optional:configserver:${CONFIG_SERVER_URI:http://localhost:8888}

  # --------------------------------------------------------
  # Base de données PostgreSQL
  # ✅ CORRIGÉ : port 5433 → 5432 (port standard PostgreSQL)
  # --------------------------------------------------------
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${COMMENT_DB_NAME:comment_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # ⚠️ validate : Flyway (V1__init_comment.sql) gère le schéma
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # --------------------------------------------------------
  # OAuth2 Resource Server — Validation JWT Keycloak
  # ✅ CORRIGÉ : realm = incident-realm (était incident-management)
  # --------------------------------------------------------
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/incident-realm}

# --------------------------------------------------------
# Eureka Client
# --------------------------------------------------------
eureka:
  instance:
    prefer-ip-address: true
    instance-id: ${spring.application.name}:${server.port}
  client:
    service-url:
      defaultZone: ${EUREKA_DEFAULT_ZONE:http://admin:admin@localhost:8761/eureka/}
    fetch-registry: true
    register-with-eureka: true

# --------------------------------------------------------
# Spring Cloud Config Client — Authentification Basic Auth
# --------------------------------------------------------
spring.cloud.config:
  uri: ${CONFIG_SERVER_URI:http://localhost:8888}
  username: ${CONFIG_SERVER_USERNAME:configuser}
  password: ${CONFIG_SERVER_PASSWORD:configpassword}
  fail-fast: false

# --------------------------------------------------------
# Actuator
# --------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

# --------------------------------------------------------
# Logging
# --------------------------------------------------------
logging:
  level:
    com.app.comment: DEBUG
    org.springframework.security: WARN

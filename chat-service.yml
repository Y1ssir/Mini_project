# ============================================================
# chat-service.yml - Configuration spécifique au Chat Service
# ============================================================

server:
  port: ${CHAT_SERVICE_PORT:8084}

spring:
  application:
    name: chat-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:postgres}:${DB_PORT:5432}/${CHAT_DB_NAME:chat_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ----------------------------------------
  # WebSocket Configuration
  # ----------------------------------------
  websocket:
    # Délai maximal d'inactivité avant fermeture (ms)
    session-timeout: 300000

# ----------------------------------------
# Redis - Stockage des sessions WebSocket et cache
# ----------------------------------------
  data:
    redis:
      host: ${REDIS_HOST:redis}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0

# ----------------------------------------
# Communication inter-services
# ----------------------------------------
services:
  user-service:
    url: lb://USER-SERVICE
  incident-service:
    url: lb://INCIDENT-SERVICE

# ----------------------------------------
# Paramètres métier du chat
# ----------------------------------------
app:
  chat:
    # Longueur maximale d'un message
    max-message-length: 2000
    # Nombre maximum de messages récupérés en historique
    history-limit: 100
    # Durée de conservation des messages (en jours)
    message-retention-days: 365
    # Taille maximale des fichiers partagés dans le chat (5 MB)
    max-file-size: 5242880

logging:
  level:
    com.incident.chat: DEBUG

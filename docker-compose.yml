# ============================================================
# docker-compose.yml - Infrastructure complète
# Gestion d'incidents - Architecture Microservices
# ============================================================
# Usage (depuis le dossier main/) :
#   Démarrage complet : docker-compose up --build
#   Sans rebuild :       docker-compose up -d
#   Arrêt :              docker-compose down
#   Arrêt + volumes :    docker-compose down -v
# ============================================================
# ⚠️ NOTE SUR LES CHEMINS :
#   Ce fichier est dans main/. Les services sont à ../services/
#   et le config-repo est à ../config-repo/
#   Infrastructure (init-db.sql, keycloak/) reste dans ./infrastructure/
# ============================================================

version: '3.9'

networks:
  incident-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  minio_data:
    driver: local
  keycloak_data:
    driver: local
  config_repo_data:
    driver: local
  redis_data:
    driver: local

services:

  # ----------------------------------------------------------
  # POSTGRESQL - Base de données relationnelle
  # ----------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: incident-postgres
    restart: unless-stopped
    networks:
      - incident-network
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-incident_platform}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------
  # REDIS - Cache et sessions WebSocket (requis par chat-service)
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: incident-redis
    restart: unless-stopped
    networks:
      - incident-network
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: >
      sh -c "if [ -n '$$REDIS_PASSWORD' ]; then
               redis-server --requirepass $$REDIS_PASSWORD;
             else
               redis-server;
             fi"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------
  # KEYCLOAK - IAM / Gestion des identités
  # Exposé sur 8180 (hôte) pour éviter conflit avec Gateway (:8080)
  # ----------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.2
    container_name: incident-keycloak
    restart: unless-stopped
    networks:
      - incident-network
    ports:
      - "8180:8080"
    volumes:
      - ./infrastructure/keycloak/incident-realm.json:/opt/keycloak/data/import/incident-realm.json:ro
    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${KEYCLOAK_DB:-keycloak_db}
      KC_DB_USERNAME: ${POSTGRES_USER:-postgres}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:-localhost}
      KC_HOSTNAME_PORT: 8180
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"
      KC_METRICS_ENABLED: "true"
    command:
      - start-dev
      - --import-realm
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/health/ready || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  # ----------------------------------------------------------
  # MINIO - Stockage objet S3 (avatars, pièces jointes)
  # ----------------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: incident-minio
    restart: unless-stopped
    networks:
      - incident-network
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin123}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------
  # EUREKA SERVER - Service Register (port 8761)
  # ⚠️ Chemin corrigé : ../services/ (par rapport à main/)
  # ----------------------------------------------------------
  eureka-server:
    build:
      context: ../services/eureka-server
      dockerfile: Dockerfile
    image: incident/eureka-server:1.0.0
    container_name: incident-eureka
    restart: unless-stopped
    networks:
      - incident-network
    ports:
      - "8761:8761"
    environment:
      EUREKA_USERNAME: ${EUREKA_USERNAME:-admin}
      EUREKA_PASSWORD: ${EUREKA_PASSWORD:-admin}
      EUREKA_HOSTNAME: eureka-server
      JAVA_OPTS: "-Xms256m -Xmx512m"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ----------------------------------------------------------
  # CONFIG SERVER - Configuration centralisée (port 8888)
  # ⚠️ Chemins corrigés : ../services/ et ../config-repo/
  # ----------------------------------------------------------
  config-server:
    build:
      context: ../services/config-server
      dockerfile: Dockerfile
    image: incident/config-server:1.0.0
    container_name: incident-config
    restart: unless-stopped
    networks:
      - incident-network
    ports:
      - "8888:8888"
    volumes:
      # ✅ CORRIGÉ : config-repo est à ../config-repo/ par rapport à main/
      - ../config-repo:/config-repo:ro
    environment:
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configpassword}
      SPRING_PROFILES_ACTIVE: native
      CONFIG_REPO_NATIVE_PATH: file:///config-repo
      EUREKA_DEFAULT_ZONE: http://${EUREKA_USERNAME:-admin}:${EUREKA_PASSWORD:-admin}@eureka-server:8761/eureka/
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8888/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ----------------------------------------------------------
  # API GATEWAY - Point d'entrée unique (port 8080)
  # ⚠️ Chemin corrigé : ../services/gateway
  # ----------------------------------------------------------
  gateway:
    build:
      context: ../services/gateway
      dockerfile: Dockerfile
    image: incident/gateway:1.0.0
    container_name: incident-gateway
    restart: unless-stopped
    networks:
      - incident-network
    ports:
      - "8080:8080"
    environment:
      EUREKA_DEFAULT_ZONE: http://${EUREKA_USERNAME:-admin}:${EUREKA_PASSWORD:-admin}@eureka-server:8761/eureka/
      CONFIG_SERVER_URI: http://config-server:8888
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configpassword}
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/incident-realm
      JAVA_OPTS: "-Xms512m -Xmx1g"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s

  # ----------------------------------------------------------
  # USER SERVICE - Gestion des utilisateurs (port 8081)
  # ⚠️ Chemin corrigé : ../services/user-service
  # ----------------------------------------------------------
  user-service:
    build:
      context: ../services/user-service
      dockerfile: Dockerfile
    image: incident/user-service:1.0.0
    container_name: incident-user-service
    restart: unless-stopped
    networks:
      - incident-network
    environment:
      SPRING_APPLICATION_NAME: user-service
      EUREKA_DEFAULT_ZONE: http://${EUREKA_USERNAME:-admin}:${EUREKA_PASSWORD:-admin}@eureka-server:8761/eureka/
      CONFIG_SERVER_URI: http://config-server:8888
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configpassword}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      USER_DB_NAME: user_db
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/incident-realm
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ----------------------------------------------------------
  # INCIDENT SERVICE - Gestion des incidents (port 8082)
  # ⚠️ Chemin corrigé : ../services/incident-service
  # ----------------------------------------------------------
  incident-service:
    build:
      context: ../services/incident-service
      dockerfile: Dockerfile
    image: incident/incident-service:1.0.0
    container_name: incident-incident-service
    restart: unless-stopped
    networks:
      - incident-network
    environment:
      SPRING_APPLICATION_NAME: incident-service
      EUREKA_DEFAULT_ZONE: http://${EUREKA_USERNAME:-admin}:${EUREKA_PASSWORD:-admin}@eureka-server:8761/eureka/
      CONFIG_SERVER_URI: http://config-server:8888
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configpassword}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      INCIDENT_DB_NAME: incident_db
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY:-minioadmin123}
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/incident-realm
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ----------------------------------------------------------
  # COMMENT SERVICE - Gestion des commentaires (port 8083)
  # ⚠️ Chemin corrigé : ../services/comment-service
  # ----------------------------------------------------------
  comment-service:
    build:
      context: ../services/comment-service
      dockerfile: Dockerfile
    image: incident/comment-service:1.0.0
    container_name: incident-comment-service
    restart: unless-stopped
    networks:
      - incident-network
    environment:
      SPRING_APPLICATION_NAME: comment-service
      EUREKA_DEFAULT_ZONE: http://${EUREKA_USERNAME:-admin}:${EUREKA_PASSWORD:-admin}@eureka-server:8761/eureka/
      CONFIG_SERVER_URI: http://config-server:8888
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configpassword}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      COMMENT_DB_NAME: comment_db
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/incident-realm
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy

  # ----------------------------------------------------------
  # CHAT SERVICE - Chatbot IA temps réel (port 8084)
  # ⚠️ Chemin corrigé : ../services/chat-service
  # ----------------------------------------------------------
  chat-service:
    build:
      context: ../services/chat-service
      dockerfile: Dockerfile
    image: incident/chat-service:1.0.0
    container_name: incident-chat-service
    restart: unless-stopped
    networks:
      - incident-network
    environment:
      SPRING_APPLICATION_NAME: chat-service
      EUREKA_DEFAULT_ZONE: http://${EUREKA_USERNAME:-admin}:${EUREKA_PASSWORD:-admin}@eureka-server:8761/eureka/
      CONFIG_SERVER_URI: http://config-server:8888
      CONFIG_SERVER_USERNAME: ${CONFIG_SERVER_USERNAME:-configuser}
      CONFIG_SERVER_PASSWORD: ${CONFIG_SERVER_PASSWORD:-configpassword}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      CHAT_DB_NAME: chat_db
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      KEYCLOAK_ISSUER_URI: http://keycloak:8080/realms/incident-realm
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-changeme}
      JAVA_OPTS: "-Xms256m -Xmx512m"
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ----------------------------------------------------------
  # FRONTEND - Client App (port 3000)
  # ----------------------------------------------------------
  client-app:
    build:
      context: ../frontend/client-app
      dockerfile: Dockerfile
    image: incident/client-app:1.0.0
    container_name: incident-client-app
    restart: unless-stopped
    networks:
      - incident-network
    ports:
      - "3000:80"
    depends_on:
      - gateway

  # ----------------------------------------------------------
  # FRONTEND - Admin Dashboard (port 3001)
  # ----------------------------------------------------------
  admin-dashboard:
    build:
      context: ../frontend/admin-dashboard
      dockerfile: Dockerfile
    image: incident/admin-dashboard:1.0.0
    container_name: incident-admin-dashboard
    restart: unless-stopped
    networks:
      - incident-network
    ports:
      - "3001:80"
    depends_on:
      - gateway
